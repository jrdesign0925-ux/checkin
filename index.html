<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>員工打卡系統</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap");
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a0f;
  --bg2:#0d1117;
  --bg3:#161b22;
  --border:#1e2d3d;
  --green:#00ff88;
  --amber:#ffb020;
  --red:#ff4757;
  --blue:#00b4ff;
  --text:#e6edf3;
  --text2:#8b949e;
  --text3:#484f58;
  --glow-g:0 0 20px rgba(0,255,136,.25);
  --glow-a:0 0 20px rgba(255,176,32,.25);
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:"Noto Sans TC",sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,180,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(0,255,136,.06) 0%,transparent 70%);pointer-events:none;z-index:0}

.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;padding:0 0 48px}

/* Header */
.hdr{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.logo{font-family:"Rajdhani",sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;color:var(--green);text-transform:uppercase}
.sys-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,136,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(0,255,136,0)}}
.hdr-title{font-family:"Rajdhani",sans-serif;font-size:26px;font-weight:700;letter-spacing:.05em;color:var(--text)}
.hdr-title span{color:var(--green)}

.main{flex:1;padding:16px 16px 0}

/* Profile */
.profile-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;position:relative;overflow:hidden}
.profile-card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.av{width:46px;height:46px;border-radius:50%;border:2px solid var(--green);object-fit:cover;flex-shrink:0;background:var(--bg3)}
.av-ph{width:46px;height:46px;border-radius:50%;border:2px solid var(--green);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--green);flex-shrink:0;font-family:"Rajdhani",sans-serif}
.p-info{flex:1;min-width:0}
.p-name{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-id{font-size:10px;color:var(--text3);margin-top:2px;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge-ok{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3);flex-shrink:0}
.p-loading{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px}

/* Clock */
.clock-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 16px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden}
.clock-card::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent)}
.clock-date{font-size:12px;color:var(--text2);letter-spacing:.08em;margin-bottom:4px}
.clock-time{font-family:"Rajdhani",sans-serif;font-size:52px;font-weight:700;letter-spacing:.04em;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.clock-time .colon{color:var(--green);animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.clock-day{font-size:12px;color:var(--text2);margin-top:4px;letter-spacing:.1em}

/* GPS */
.gps-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.gps-icon{font-size:18px;flex-shrink:0}
.gps-info{flex:1;min-width:0}
.gps-label{color:var(--text2);font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.gps-val{color:var(--text);font-family:monospace;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gps-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;flex-shrink:0;letter-spacing:.04em}
.gps-badge.wait{background:rgba(255,176,32,.1);color:var(--amber);border:1px solid rgba(255,176,32,.3)}
.gps-badge.got {background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.gps-badge.fail{background:rgba(255,71,87,.1); color:var(--red); border:1px solid rgba(255,71,87,.3)}

/* Note */
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:16px}
.note-label{font-size:10px;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.note-ta{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);font-family:inherit;resize:none;outline:none;transition:border-color .2s}
.note-ta:focus{border-color:var(--green)}
.note-ta::placeholder{color:var(--text3)}

/* Buttons */
.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.btn{position:relative;border:none;border-radius:12px;padding:20px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;overflow:hidden;display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;transition:transform .1s,filter .1s}
.btn::before{content:"";position:absolute;inset:0;opacity:0;transition:opacity .15s}
.btn:active:not(:disabled)::before{opacity:1}
.btn:active:not(:disabled){transform:scale(.96)}
.btn:disabled{filter:brightness(.4);cursor:not-allowed;transform:none!important}
.btn-in{background:linear-gradient(135deg,#004d2a,#006635);border:1px solid rgba(0,255,136,.3);box-shadow:var(--glow-g)}
.btn-in::before{background:rgba(0,255,136,.15)}
.btn-in .btn-lbl{font-family:"Rajdhani",sans-serif;font-size:17px;font-weight:700;color:var(--green);letter-spacing:.06em}
.btn-in .btn-sub{font-size:10px;color:rgba(0,255,136,.6);letter-spacing:.1em}
.btn-out{background:linear-gradient(135deg,#4d2a00,#663500);border:1px solid rgba(255,176,32,.3);box-shadow:var(--glow-a)}
.btn-out::before{background:rgba(255,176,32,.15)}
.btn-out .btn-lbl{font-family:"Rajdhani",sans-serif;font-size:17px;font-weight:700;color:var(--amber);letter-spacing:.06em}
.btn-out .btn-sub{font-size:10px;color:rgba(255,176,32,.6);letter-spacing:.1em}
.btn-ico{font-size:28px;line-height:1}
.btn-spinner{display:none;width:24px;height:24px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.btn.loading .btn-spinner{display:block}
.btn.loading .bc{opacity:0}
@keyframes sp{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* Records */
.rec-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.rec-hdr{padding:10px 16px;font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.15em;text-transform:uppercase;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.rec-hdr::before{content:"";width:3px;height:12px;background:var(--green);border-radius:2px;flex-shrink:0}
.rec-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.rec-row:last-child{border-bottom:none}
.rec-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0;font-family:"Rajdhani",sans-serif;letter-spacing:.06em}
.rec-badge.in {background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.rec-badge.out{background:rgba(255,176,32,.1);color:var(--amber);border:1px solid rgba(255,176,32,.3)}
.rec-time{font-size:14px;font-weight:700;color:var(--text);font-family:"Rajdhani",sans-serif}
.rec-gps{font-size:10px;color:var(--text3);font-family:monospace}
.rec-empty{padding:20px 16px;text-align:center;color:var(--text3);font-size:13px}

/* Toast */
.tw{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;width:calc(100% - 32px);max-width:400px;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.5;white-space:pre-line;animation:tin .25s ease forwards}
.toast.ok {background:#0a2a1a;border:1px solid var(--green);color:var(--green);box-shadow:var(--glow-g)}
.toast.err{background:#2a0a0a;border:1px solid var(--red);color:var(--red)}
.toast.wn {background:#2a1a00;border:1px solid var(--amber);color:var(--amber)}
.toast.hide{animation:tout .2s ease forwards}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}

/* 全頁遮罩 */
#mask{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:8888;transition:opacity .4s}
#mask.hide{opacity:0;pointer-events:none}
.mask-ring{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite}
.mask-txt{font-size:13px;color:var(--text2);letter-spacing:.08em}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div id="mask">
  <div class="mask-ring"></div>
  <div class="mask-txt">系統啟動中…</div>
</div>

<div class="page">
  <header class="hdr">
    <div class="hdr-top">
      <div class="logo">Attendance System</div>
      <div class="sys-status"><div class="dot"></div><span>ONLINE</span></div>
    </div>
    <div class="hdr-title">員工<span>打卡</span>系統</div>
  </header>

  <div class="tw" id="tw"></div>

  <main class="main">
    <div class="profile-card" id="profileCard">
      <div class="p-loading">
        <div style="width:14px;height:14px;border:2px solid #1e2d3d;border-top-color:#00ff88;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0"></div>
        載入 LINE 帳號中…
      </div>
    </div>

    <div class="clock-card">
      <div class="clock-date" id="cDate">─</div>
      <div class="clock-time">
        <span id="cH">--</span><span class="colon">:</span><span id="cM">--</span><span class="colon">:</span><span id="cS">--</span>
      </div>
      <div class="clock-day" id="cDay">─</div>
    </div>

    <div class="gps-card">
      <span class="gps-icon">📡</span>
      <div class="gps-info">
        <div class="gps-label">GPS Location</div>
        <div class="gps-val" id="gpsVal">正在取得座標…</div>
      </div>
      <span class="gps-badge wait" id="gpsBadge">WAIT</span>
    </div>

    <div class="note-card">
      <div class="note-label">Remark / 備註（選填）</div>
      <textarea class="note-ta" id="note" rows="2" placeholder="如有需要補充的事項，請在此輸入…" maxlength="100"></textarea>
    </div>

    <div class="btns">
      <button class="btn btn-in" id="btnIn" onclick="doCheck('上班')">
        <div class="bc">
          <div class="btn-ico">▶</div>
          <div class="btn-lbl">上班打卡</div>
          <div class="btn-sub">CHECK IN</div>
        </div>
        <div class="btn-spinner"></div>
      </button>
      <button class="btn btn-out" id="btnOut" onclick="doCheck('下班')">
        <div class="bc">
          <div class="btn-ico">■</div>
          <div class="btn-lbl">下班打卡</div>
          <div class="btn-sub">CHECK OUT</div>
        </div>
        <div class="btn-spinner"></div>
      </button>
    </div>

    <div class="rec-wrap">
      <div class="rec-hdr">今日打卡紀錄</div>
      <div id="recList"><div class="rec-empty">尚無打卡紀錄</div></div>
    </div>
  </main>
</div>

<script>
// ★ 這兩行填你自己的資料
var GAS_URL = 'YOUR_GAS_URL_HERE';       // GAS 部署網址
var LIFF_ID = '2010225565-nFUkSOcC';     // 你的 LIFF ID

var gps = null, me = null, busy = false;
var DAYS = ['週日','週一','週二','週三','週四','週五','週六'];

// 時鐘
function tick() {
  var n = new Date(), p = function(x){ return String(x).padStart(2,'0'); };
  document.getElementById('cH').textContent = p(n.getHours());
  document.getElementById('cM').textContent = p(n.getMinutes());
  document.getElementById('cS').textContent = p(n.getSeconds());
  document.getElementById('cDate').textContent = n.getFullYear() + ' / ' + (n.getMonth()+1) + ' / ' + n.getDate();
  document.getElementById('cDay').textContent = DAYS[n.getDay()];
}
setInterval(tick, 1000); tick();

// GPS
function startGPS() {
  if (!navigator.geolocation) { setGPS('fail','不支援 GPS','FAIL'); return; }
  navigator.geolocation.getCurrentPosition(
    function(p) {
      gps = { lat: p.coords.latitude, lng: p.coords.longitude, acc: Math.round(p.coords.accuracy) };
      setGPS('got', gps.lat.toFixed(6) + ',  ' + gps.lng.toFixed(6) + '   ±' + gps.acc + 'm', 'GOT');
    },
    function(e) {
      var m = {1:'請允許位置存取權限', 2:'無法取得 GPS 訊號', 3:'定位逾時'};
      setGPS('fail', m[e.code] || '定位失敗', 'FAIL');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}
function setGPS(cls, val, label) {
  document.getElementById('gpsVal').textContent = val;
  var b = document.getElementById('gpsBadge');
  b.className = 'gps-badge ' + cls; b.textContent = label;
}
startGPS();

// LIFF 初始化
function hideMask() {
  var m = document.getElementById('mask');
  m.classList.add('hide');
  setTimeout(function(){ m.style.display = 'none'; }, 450);
}

function renderProfile(p) {
  var av = p.pic
    ? '<img class="av" src="' + p.pic + '" alt=""/>'
    : '<div class="av-ph">' + (p.name[0] || '?') + '</div>';
  document.getElementById('profileCard').innerHTML =
    av + '<div class="p-info"><div class="p-name">' + esc(p.name) + '</div>'
    + '<div class="p-id">' + esc(p.id) + '</div></div>'
    + '<div class="badge-ok">VERIFIED</div>';
}

liff.init({ liffId: LIFF_ID })
  .then(function() {
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    return liff.getProfile();
  })
  .then(function(p) {
    if (!p) return;
    me = { id: p.userId, name: p.displayName, pic: p.pictureUrl };
    renderProfile(me);
    hideMask();
  })
  .catch(function(e) {
    console.error(e);
    hideMask();
    toast('⚠ 請從 LINE 內開啟此頁面', 'wn', 8000);
  });

// 打卡
function doCheck(type) {
  if (busy) return;
  if (!me)  { toast('LINE 帳號尚未就緒', 'err'); return; }
  if (!gps) { toast('GPS 尚未取得，請稍候', 'wn'); return; }

  var bid = type === '上班' ? 'btnIn' : 'btnOut';
  var oid = type === '上班' ? 'btnOut' : 'btnIn';
  var btn = document.getElementById(bid);
  busy = true; btn.classList.add('loading'); btn.disabled = true;
  document.getElementById(oid).disabled = true;

  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      lineUserId: me.id, displayName: me.name,
      checkType: type,
      latitude: gps.lat, longitude: gps.lng, accuracy: gps.acc,
      note: document.getElementById('note').value.trim(),
      userAgent: navigator.userAgent
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    if (d.ok) {
      toast('✅ ' + d.msg + '\n' + d.time, 'ok');
      addRec(type, d.time, gps.lat, gps.lng);
      document.getElementById('note').value = '';
      lockBtn(btn, type === '上班' ? 'CHECK IN' : 'CHECK OUT', 60);
    } else if (d.duplicate) {
      toast('⚠ ' + d.msg, 'wn');
    } else {
      toast('✖ ' + (d.msg || '打卡失敗'), 'err');
    }
  })
  .catch(function(){ toast('✖ 網路錯誤，請稍後再試', 'err'); })
  .finally(function() {
    btn.classList.remove('loading'); busy = false;
    document.getElementById(oid).disabled = false;
    if (!btn.dataset.locked) btn.disabled = false;
  });
}

function lockBtn(btn, label, sec) {
  btn.dataset.locked = '1'; btn.disabled = true;
  var r = sec, sub = btn.querySelector('.btn-sub');
  var t = setInterval(function() {
    r--; sub.textContent = r + 's 後解鎖';
    if (r <= 0) { clearInterval(t); btn.disabled = false; btn.dataset.locked = ''; sub.textContent = label; }
  }, 1000);
}

function addRec(type, time, lat, lng) {
  var list = document.getElementById('recList');
  var e = list.querySelector('.rec-empty'); if (e) e.remove();
  var row = document.createElement('div'); row.className = 'rec-row';
  var t = String(time).split(' ')[1] || time;
  row.innerHTML = '<span class="rec-badge ' + (type==='上班'?'in':'out') + '">' + (type==='上班'?'IN':'OUT') + '</span>'
    + '<div><div class="rec-time">' + esc(t) + '</div>'
    + '<div class="rec-gps">' + lat.toFixed(5) + ',  ' + lng.toFixed(5) + '</div></div>';
  list.prepend(row);
}

function toast(msg, type, ms) {
  var w = document.getElementById('tw'), d = document.createElement('div');
  d.className = 'toast ' + (type || 'ok'); d.textContent = msg;
  w.appendChild(d);
  setTimeout(function(){ d.classList.add('hide'); setTimeout(function(){ d.remove(); }, 250); }, ms || 4000);
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
</script>
</body>
</html>
